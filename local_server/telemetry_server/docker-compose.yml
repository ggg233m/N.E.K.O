version: "3.8"

services:
  telemetry:
    build: .
    ports:
      - "8099:8099"
    volumes:
      - ./data:/app/data
    environment:
      # ★ Must override: admin auth token (used for dashboard / export / queries).
      # Set TELEMETRY_ADMIN_TOKEN in your .env file (or shell environment) before
      # running docker-compose; otherwise the container falls back to a clearly
      # invalid placeholder and the admin API must not be considered secure.
      - TELEMETRY_ADMIN_TOKEN=${TELEMETRY_ADMIN_TOKEN:-please-change-me}
      # 可选：启用 /docs Swagger 页面
      # - TELEMETRY_ENABLE_DOCS=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8099/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
